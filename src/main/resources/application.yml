spring:
  application:
    name: agentscope-java-backend
  # 数据库配置
  datasource:
    url: jdbc:mysql://192.168.2.168:13306/agentscope?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Redis 配置
  data:
    redis:
      host: 192.168.2.168
      port: 16379
      password: 123456
      database: 0

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.corporate.finance.ai.system.entity
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 大模型服务配置
model:
  defaultService: dashscope
  services:
    dashscope:
      api-key: sk-45718b81ssssssssssssss750d523d
      base-url: https://dashscope.aliyuncs.com/api/v1
      model: qwen-turbo

# 天气查询API配置（高德天气）
weather:
  api-key: ede7b9c6ece1edsssssssss19b48875
  base-url: https://restapi.amap.com/v3/weather/weatherInfo

# 系统配置
system:
  # 登录配置
  login:
    max-fail-count: 5
    lock-time: 30 # 分钟
  # 密码重置配置
  password:
    reset-default: 123456
  # AES 加密配置
  aes:
    key: a8f5e2c9b4d7f1a3e6c8b2d5f9a4c7e1
    iv: b3d6f9a2c5e8h1k4
